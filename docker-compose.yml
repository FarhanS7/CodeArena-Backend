services:
  # Auth Database
  auth-db:
    image: postgres:15
    container_name: auth_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "21000:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Execution Database
  execution-db:
    image: postgres:15
    container_name: execution_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: execution_db
    ports:
      - "21001:5432"
    volumes:
      - execution_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Auth Service (NestJS)
  auth-service:
    build: ./auth-service
    container_name: auth_service
    restart: always
    env_file:
      - ./auth-service/.env.local
    ports:
      - "20001:3100"
    depends_on:
      - auth-db
    networks:
      - judge_network

  # Execution Service (NestJS)
  execution-service:
    build: ./execution-service
    container_name: execution_service
    restart: always
    environment:
      PORT: 3002
      DB_HOST: execution-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: execution_db
      PROBLEM_SERVICE_URL: http://problem-service:8080
      JWT_SECRET: your-secret-key-change-this-in-production
      JUDGE0_URL: https://judge0-ce.p.rapidapi.com
      JUDGE0_API_KEY: ${JUDGE0_API_KEY}
    ports:
      - "20002:3002"
    depends_on:
      - execution-db
    networks:
      - judge_network

  # Problem Database
  problem-db:
    image: postgres:15
    container_name: problem_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: problem_db
    ports:
      - "21002:5432"
    volumes:
      - problem_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Problem Service (Java/Spring Boot)
  problem-service:
    build: ./problem-service
    container_name: problemservice
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://problem-db:5432/problem_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "20003:8080"
    depends_on:
      - problem-db
    networks:
      - judge_network

  # Redis (for Bull MQ and Leaderboard)
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "21005:6379"
    networks:
      - judge_network

  # API Gateway (NestJS)
  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    restart: always
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3100
      PROBLEM_SERVICE_URL: http://problem-service:8080
      EXECUTION_SERVICE_URL: http://execution-service:3002
      LEADERBOARD_SERVICE_URL: http://leaderboard-service:3003
      CONTEST_SERVICE_URL: http://contest-service:3008
      AI_SERVICE_URL: http://ai-service:3006
    ports:
      - "20000:3000"
    depends_on:
      - auth-service
      - execution-service
      - problem-service
    networks:
      - judge_network

  # Leaderboard Database
  leaderboard-db:
    image: postgres:15
    container_name: leaderboard_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leaderboard_db
    ports:
      - "21003:5432"
    volumes:
      - leaderboard_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Leaderboard Service (NestJS)
  leaderboard-service:
    build: ./leaderboard-service
    container_name: leaderboard_service
    restart: always
    environment:
      PORT: 3003
      DB_HOST: leaderboard-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: leaderboard_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "20004:3003"
    depends_on:
      - leaderboard-db
      - redis
    networks:
      - judge_network

  # Discussion Database
  discussion-db:
    image: postgres:15
    container_name: discussion_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: discussion_db
    ports:
      - "21004:5432"
    volumes:
      - discussion_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Discussion Service (NestJS)
  discussion-service:
    build: ./discussion-service
    container_name: discussion_service
    restart: always
    environment:
      PORT: 3004
      DB_HOST: discussion-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: discussion_db
    ports:
      - "20005:3004"
    depends_on:
      - discussion-db
    networks:
      - judge_network

  # Real-time Service (NestJS)
  realtime-service:
    build: ./realtime-service
    container_name: realtime_service
    restart: always
    environment:
      PORT: 3005
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "20006:3005"
    depends_on:
      - redis
    networks:
      - judge_network

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: masterKey123
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "21006:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - judge_network

  # AI Service (NestJS)
  ai-service:
    build: ./ai-service
    container_name: ai_service
    restart: always
    environment:
      PORT: 3006
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PROBLEM_SERVICE_URL: http://problem-service:8080
    ports:
      - "20007:3006"
    depends_on:
      - problem-service
    networks:
      - judge_network

  # Contest Database
  contest-db:
    image: postgres:15
    container_name: contest_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contest_db
    ports:
      - "21007:5432"
    volumes:
      - contest_data:/var/lib/postgresql/data
    networks:
      - judge_network

  # Contest Service (NestJS)
  contest-service:
    build: ./contest-service
    container_name: contest_service
    restart: always
    environment:
      PORT: 3008
      DB_HOST: contest-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: contest_db
      JWT_SECRET: your-secret-key-change-this-in-production
      AUTH_SERVICE_URL: http://auth-service:3100
      PROBLEM_SERVICE_URL: http://problem-service:8080
      EXECUTION_SERVICE_URL: http://execution-service:3002
    ports:
      - "20008:3008"
    depends_on:
      - contest-db
      - auth-service
      - problem-service
    networks:
      - judge_network

networks:
  judge_network:
    driver: bridge

volumes:
  auth_data:
  execution_data:
  problem_data:
  leaderboard_data:
  discussion_data:
  contest_data:
  meili_data:
